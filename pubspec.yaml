name: notidea
description: "NotIdea - Your creative note-taking companion"
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Routing
  go_router: ^17.1.0

  # Supabase
  supabase_flutter: ^2.9.0

  # Local Database (Hive CE - cross-platform, pure Dart)
  hive_ce: ^2.7.0
  hive_ce_flutter: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.1

  # Data Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI / Styling
  mix: ^1.5.2
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.17

  # Markdown
  markdown: ^7.3.0
  flutter_quill: ^11.5.0
  markdown_quill: ^4.3.0

  # Image Handling
  image_picker: ^1.1.2
  image_cropper: ^11.0.0
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^12.0.1
  package_info_plus: ^8.0.0
  flutter_secure_storage: ^10.0.0
  flutter_dotenv: ^6.0.0
  timeago: ^3.7.0
  collection: ^1.19.0

  # Search
  flutter_typeahead: ^5.2.0

  # Splash
  flutter_native_splash: ^2.4.4
  flutter_quill_extensions: ^11.0.0
  flutter_markdown: ^0.7.7+1
  flutter_staggered_grid_view: ^0.7.0
  sentry_flutter: ^9.14.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  hive_ce_generator: ^1.7.0
  flutter_launcher_icons: ^0.14.3

flutter_native_splash:
  color: "#FCFBFA"
  color_dark: "#1A1A1A"
  android_12:
    color: "#FCFBFA"
    color_dark: "#1A1A1A"

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/app_launcher_icon.png"
    background_color: "#06A74D"
    theme_color: "#06A74D"
  image_path: "assets/images/app_launcher_icon.png"
  adaptive_icon_foreground: "assets/images/adaptive_foreground_icon.png"
  adaptive_icon_background: "#06A74D"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/legal/
    - assets/fonts/

  fonts:
    - family: UltimaPro
      fonts:
        - asset: assets/fonts/UltimaProBlack.otf
          weight: 900
