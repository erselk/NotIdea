name: notidea
description: "NotIdea - Your creative note-taking companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Supabase
  supabase_flutter: ^2.9.0

  # Local Database (Hive CE - cross-platform, pure Dart)
  hive_ce: ^2.7.0
  hive_ce_flutter: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.1

  # Data Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI / Styling
  mix: ^1.5.2
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17

  # Markdown
  flutter_markdown: ^0.7.6
  markdown: ^7.3.0
  flutter_quill: ^11.5.0
  markdown_quill: ^4.3.0

  # Image Handling
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  flutter_secure_storage: ^9.2.4
  flutter_dotenv: ^5.2.1
  timeago: ^3.7.0
  collection: ^1.19.0

  # Search
  flutter_typeahead: ^5.2.0

  # Splash
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  hive_ce_generator: ^1.7.0
  flutter_launcher_icons: ^0.14.3

flutter_native_splash:
  color: "#FCFBFA"
  color_dark: "#1A1A1A"
  android_12:
    color: "#FCFBFA"
    color_dark: "#1A1A1A"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_launcher_icon.png"
  adaptive_icon_foreground: "assets/images/adaptive_foreground_icon.png"
  adaptive_icon_background: "#06A74D"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/legal/
